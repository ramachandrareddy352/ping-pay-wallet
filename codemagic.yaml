 workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      groups:
        - appstore_credentials
      vars:
        XCODE_WORKSPACE: "ios/PingPay.xcworkspace"
        XCODE_SCHEME: "YourApp"
        BUNDLE_ID: "com.ping_pay.app"
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
