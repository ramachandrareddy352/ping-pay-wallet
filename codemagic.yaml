workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_SCHEME: "PingPay"
        BUNDLE_ID: "com.pingpay.app"
      node: 18

    scripts:
      - name: Install JS dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/PingPay.xcworkspace" \
            --scheme "PingPay"

    artifacts:
      - build/ios/ipa/*.ipa
